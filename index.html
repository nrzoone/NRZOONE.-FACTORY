    <title>NRZO0NE - Factory Management System</title>
    <!-- On-screen error reporter to debug white screen -->
    <script>
      // Global Error Tracking to catch startup crashes
      window.addEventListener('error', function(e) {
        // Ignore benign errors and AbortErrors
        const msg = e.message || '';
        if (
          msg.includes('ResizeObserver') || 
          msg.includes('Script error') ||
          /abort|cancelled|user aborted/i.test(msg)
        ) return;
        
        console.error("FATAL ERROR CAUGHT:", e);
      });

      window.addEventListener('unhandledrejection', function(event) {
        const reason = event.reason;
        const reasonStr = reason ? (reason.message || reason.toString() || String(reason)) : 'Unknown reason';
        
        // IMPORTANT: Ignore AbortErrors rigorously
        if (/abort|cancelled|user aborted|timeout|fetching/i.test(reasonStr)) {
          return;
        }

        // Only show fatal errors that stop the app
        console.error('Promise Rejection:', reasonStr);
      });
    </script>
    <!-- Meta Pixel Code -->
    <script>
      !(function (f, b, e, v, n, t, s) {
        if (f.fbq) return;
        n = f.fbq = function () {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        };
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = '2.0';
        n.queue = [];
        t = b.createElement(e);
        t.async = !0;
        t.src = v;
        s = b.getElementsByTagName(e)[0];
        s.parentNode.insertBefore(t, s);
      })(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '517991158551582');
      fbq('track', 'PageView');
    </script>
